<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact widget</title>
  <meta name="description" content="Interactive contact buttons for Telegram, WhatsApp, email and phone." />

  <script>
    window.contactWidgetConfig = {
      fonts: {
        importUrl: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap",
        family:
          'BlinkMacSystemFont, "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif',
        weights: {
          regular: "400",
          medium: "500",
          bold: "700"
        }
      },

      assets: {
        logo: {
          src: "./assets/logo.gif",

          width: "clamp(64px, 8vw, 88px)",
          top: "clamp(12px, 1.8vw, 18px)",
          right: "clamp(12px, 1.8vw, 18px)",
          borderRadius: "clamp(14px, 1.6vw, 18px)",
          opacity: "0.88",

          compact: {
            width: "58px",
            top: null,
            right: null,
            borderRadius: null,
            opacity: null
          },

          lowHeight: {
            width: "58px",
            top: null,
            right: null,
            borderRadius: null,
            opacity: null
          },

          tinyHeight: {
            display: "none"
          }
        }
      },

      content: {
        title: "Давайте обсудим проект",
        text: "Выберите удобный способ связи.<br>Кнопки откроют мессенджер или почтовый клиент."
      },

      contacts: {
        telegramUsername: "gd_kirilova",
        whatsappPhone: "+7 (927) 418-19-96",
        displayPhone: "+7 (927) 418-19-96",
        email: "gd@kkirilova.ru",
        whatsappText: "Здравствуйте! Хочу обсудить проект.",
        emailSubject: "Обсуждение проекта",
        emailBody: "Здравствуйте! Хочу обсудить проект."
      },

      highlights: {
        telegram: {
          enabled: false,
          color: "#2aabee",
          opacity: "0.12",
          hoverOpacity: "0.22"
        },
        whatsapp: {
          enabled: false,
          color: "#25d366",
          opacity: "0.12",
          hoverOpacity: "0.22"
        },
        email: {
          enabled: false,
          color: "#ffb84d",
          opacity: "0.12",
          hoverOpacity: "0.22"
        },
        phone: {
          enabled: false,
          color: "#8c7cff",
          opacity: "0.12",
          hoverOpacity: "0.22"
        }
      }
    };
  </script>

  <style>
    :root {
      /* Fonts */
      --font-family-primary:
        BlinkMacSystemFont,
        "Inter",
        ui-sans-serif,
        system-ui,
        -apple-system,
        "Segoe UI",
        sans-serif;
      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-bold: 700;

      /* Base colors */
      --bg: #13403B;
      --text: #f5f7fb;
      --muted: rgba(245, 247, 251, 0.72);

      /* Glass */
      --glass-border: rgba(255, 255, 255, 0.22);
      --glass-bg-start: rgba(255, 255, 255, 0.14);
      --glass-bg-middle: rgba(255, 255, 255, 0.065);
      --glass-bg-end: rgba(255, 255, 255, 0.09);
      --glass-highlight-start: rgba(255, 255, 255, 0.20);
      --glass-highlight-middle: rgba(255, 255, 255, 0.07);
      --glass-highlight-low: rgba(255, 255, 255, 0.025);
      --glass-highlight-end: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(22px) saturate(135%) contrast(104%);
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.18);

      /* Background blobs */
      --blob-light-color: rgba(255, 255, 255, 0.14);
      --blob-accent-color: rgba(72, 191, 162, 0.30);

      /* Logo */
      --logo-width: clamp(64px, 8vw, 88px);
      --logo-top: clamp(12px, 1.8vw, 18px);
      --logo-right: clamp(12px, 1.8vw, 18px);
      --logo-border-radius: clamp(14px, 1.6vw, 18px);
      --logo-opacity: 0.88;

      --logo-compact-width: 58px;
      --logo-compact-top: var(--logo-top);
      --logo-compact-right: var(--logo-right);
      --logo-compact-border-radius: var(--logo-border-radius);
      --logo-compact-opacity: var(--logo-opacity);

      --logo-low-height-width: 58px;
      --logo-low-height-top: var(--logo-top);
      --logo-low-height-right: var(--logo-right);
      --logo-low-height-border-radius: var(--logo-border-radius);
      --logo-low-height-opacity: var(--logo-opacity);

      --logo-tiny-height-display: none;

      /* Buttons */
      --button-border: rgba(255, 255, 255, 0.18);
      --button-bg-start: rgba(255, 255, 255, 0.105);
      --button-bg-end: rgba(255, 255, 255, 0.055);
      --button-bg-hover-start: rgba(255, 255, 255, 0.16);
      --button-bg-hover-end: rgba(255, 255, 255, 0.085);
      --button-border-hover: rgba(255, 255, 255, 0.28);
      --button-icon-bg: rgba(255, 255, 255, 0.09);

      /* Button highlight fallback */
      --button-highlight-default-color: rgba(255, 255, 255, 0.22);
      --button-highlight-default-opacity: 0.12;
      --button-highlight-default-opacity-hover: 0.22;

      /* Telegram highlight */
      --telegram-highlight-color: #2aabee;
      --telegram-highlight-opacity: 0.12;
      --telegram-highlight-opacity-hover: 0.22;

      /* WhatsApp highlight */
      --whatsapp-highlight-color: #25d366;
      --whatsapp-highlight-opacity: 0.12;
      --whatsapp-highlight-opacity-hover: 0.22;

      /* Email highlight */
      --email-highlight-color: #ffb84d;
      --email-highlight-opacity: 0.12;
      --email-highlight-opacity-hover: 0.22;

      /* Phone highlight */
      --phone-highlight-color: #8c7cff;
      --phone-highlight-opacity: 0.12;
      --phone-highlight-opacity-hover: 0.22;

      /* Motion */
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 0;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      color: var(--text);
      font-family: var(--font-family-primary);
      font-weight: var(--font-weight-regular);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .contact-page {
      position: relative;
      display: flex;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      padding: clamp(8px, 1.4vw, 16px);
      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }

    .contact-page::before,
    .contact-page::after {
      position: absolute;
      border-radius: 999px;
      content: "";
      pointer-events: none;
      z-index: 0;
    }

    .contact-page::before {
      top: -12%;
      left: -7%;
      width: 28%;
      min-width: 220px;
      aspect-ratio: 1;
      background: var(--blob-light-color);
      filter: blur(22px);
    }

    .contact-page::after {
      right: -10%;
      bottom: -18%;
      width: 34%;
      min-width: 280px;
      aspect-ratio: 1;
      background: var(--blob-accent-color);
      filter: blur(26px);
    }

    .contact-widget {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      padding: clamp(14px, 2.4vw, 24px);
      overflow: hidden;
      border: 1px solid var(--glass-border);
      border-radius: clamp(20px, 2.4vw, 28px);
      background:
        linear-gradient(
          135deg,
          var(--glass-bg-start),
          var(--glass-bg-middle) 46%,
          var(--glass-bg-end)
        );
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        inset 0 -1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
    }

    .contact-widget::before {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(
          135deg,
          var(--glass-highlight-start) 0%,
          var(--glass-highlight-middle) 34%,
          var(--glass-highlight-low) 58%,
          var(--glass-highlight-end) 100%
        );
      content: "";
      pointer-events: none;
      z-index: 0;
    }

    .contact-widget__gif-corner {
      position: absolute;
      top: var(--logo-top);
      right: var(--logo-right);
      width: var(--logo-width);
      height: auto;
      border-radius: var(--logo-border-radius);
      opacity: var(--logo-opacity);
      pointer-events: none;
      z-index: 3;
    }

    .contact-widget__header {
      position: relative;
      z-index: 2;
      display: grid;
      gap: clamp(4px, 0.8vw, 8px);
      max-width: calc(100% - clamp(88px, 12vw, 124px));
      margin-bottom: clamp(10px, 1.4vw, 18px);
    }

    .contact-widget__title {
      margin: 0;
      color: var(--text);
      font-family: var(--font-family-primary);
      font-size: clamp(24px, 3.2vw, 42px);
      font-weight: var(--font-weight-bold);
      line-height: 1.04;
      letter-spacing: -0.04em;
    }

    .contact-widget__text {
      max-width: 560px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(12px, 1.15vw, 15px);
      font-weight: var(--font-weight-regular);
      line-height: 1.4;
    }

    .contact-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(7px, 1vw, 12px);
      width: 100%;
      min-width: 0;
      margin-top: auto;
    }

    .contact-button {
      --button-highlight-color: var(--button-highlight-default-color);
      --button-highlight-opacity: var(--button-highlight-default-opacity);
      --button-highlight-opacity-hover: var(--button-highlight-default-opacity-hover);

      position: relative;
      display: flex;
      align-items: center;
      gap: clamp(7px, 1vw, 12px);
      min-width: 0;
      min-height: clamp(46px, 5.6vw, 66px);
      padding: clamp(8px, 1.1vw, 13px);
      overflow: hidden;
      border: 1px solid var(--button-border);
      border-radius: clamp(13px, 1.5vw, 18px);
      background:
        linear-gradient(
          135deg,
          var(--button-bg-start),
          var(--button-bg-end)
        );
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        0 6px 16px rgba(0, 0, 0, 0.06);
      color: var(--text);
      text-decoration: none;
      transition:
        transform var(--transition),
        border-color var(--transition),
        background var(--transition);
      isolation: isolate;
    }

    .contact-button--telegram {
      --button-highlight-color: var(--telegram-highlight-color);
      --button-highlight-opacity: var(--telegram-highlight-opacity);
      --button-highlight-opacity-hover: var(--telegram-highlight-opacity-hover);
    }

    .contact-button--whatsapp {
      --button-highlight-color: var(--whatsapp-highlight-color);
      --button-highlight-opacity: var(--whatsapp-highlight-opacity);
      --button-highlight-opacity-hover: var(--whatsapp-highlight-opacity-hover);
    }

    .contact-button--email {
      --button-highlight-color: var(--email-highlight-color);
      --button-highlight-opacity: var(--email-highlight-opacity);
      --button-highlight-opacity-hover: var(--email-highlight-opacity-hover);
    }

    .contact-button--phone {
      --button-highlight-color: var(--phone-highlight-color);
      --button-highlight-opacity: var(--phone-highlight-opacity);
      --button-highlight-opacity-hover: var(--phone-highlight-opacity-hover);
    }

    .contact-button::after {
      position: absolute;
      inset: auto 10px 10px auto;
      width: 68px;
      height: 68px;
      border-radius: 999px;
      background: var(--button-highlight-color);
      opacity: var(--button-highlight-opacity);
      filter: blur(10px);
      content: "";
      z-index: -1;
      transition:
        opacity var(--transition),
        transform var(--transition);
    }

    .contact-button:hover,
    .contact-button:focus-visible {
      transform: translateY(-2px);
      border-color: var(--button-border-hover);
      background:
        linear-gradient(
          135deg,
          var(--button-bg-hover-start),
          var(--button-bg-hover-end)
        );
      color: var(--text);
      text-decoration: none;
      outline: none;
    }

    .contact-button:hover::after,
    .contact-button:focus-visible::after {
      opacity: var(--button-highlight-opacity-hover);
      transform: scale(1.18);
    }

    .contact-button__icon {
      display: grid;
      place-items: center;
      flex: 0 0 clamp(28px, 3.8vw, 40px);
      width: clamp(28px, 3.8vw, 40px);
      height: clamp(28px, 3.8vw, 40px);
      border-radius: clamp(9px, 1.3vw, 13px);
      background: var(--button-icon-bg);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.12),
        0 4px 12px rgba(0, 0, 0, 0.06);
    }

    .contact-button__icon svg {
      width: clamp(16px, 2.2vw, 22px);
      height: clamp(16px, 2.2vw, 22px);
    }

    .contact-button__content {
      min-width: 0;
      overflow: hidden;
    }

    .contact-button__label {
      display: block;
      max-width: 100%;
      margin-bottom: 2px;
      overflow: hidden;
      color: var(--text);
      font-size: clamp(11px, 1.25vw, 15px);
      font-weight: var(--font-weight-bold);
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contact-button__value {
      display: block;
      max-width: 100%;
      overflow: hidden;
      color: var(--muted);
      font-size: clamp(9px, 1vw, 12px);
      font-weight: var(--font-weight-regular);
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 420px) {
      .contact-widget__text {
        max-width: 240px;
      }

      .contact-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 340px) {
      .contact-widget {
        padding: 12px;
      }

      .contact-widget__gif-corner {
        top: var(--logo-compact-top);
        right: var(--logo-compact-right);
        width: var(--logo-compact-width);
        border-radius: var(--logo-compact-border-radius);
        opacity: var(--logo-compact-opacity);
      }

      .contact-widget__header {
        max-width: calc(100% - 72px);
      }

      .contact-widget__title {
        font-size: 21px;
      }

      .contact-widget__text {
        display: none;
      }

      .contact-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .contact-button {
        min-height: 42px;
        padding: 7px;
        gap: 6px;
      }

      .contact-button__icon {
        flex-basis: 28px;
        width: 28px;
        height: 28px;
      }

      .contact-button__icon svg {
        width: 16px;
        height: 16px;
      }

      .contact-button__label {
        font-size: 11px;
      }

      .contact-button__value {
        display: none;
      }
    }

    @media (max-height: 360px) {
      .contact-page {
        padding: 8px;
      }

      .contact-widget {
        padding: 12px;
      }

      .contact-widget__gif-corner {
        top: var(--logo-low-height-top);
        right: var(--logo-low-height-right);
        width: var(--logo-low-height-width);
        border-radius: var(--logo-low-height-border-radius);
        opacity: var(--logo-low-height-opacity);
      }

      .contact-widget__header {
        max-width: calc(100% - 74px);
        margin-bottom: 8px;
      }

      .contact-widget__title {
        font-size: clamp(21px, 3vw, 30px);
      }

      .contact-widget__text {
        display: none;
      }

      .contact-button {
        min-height: 42px;
      }

      .contact-button__value {
        display: none;
      }
    }

    @media (max-height: 300px) {
      .contact-widget__gif-corner {
        display: var(--logo-tiny-height-display);
      }

      .contact-widget__header {
        max-width: 100%;
        margin-bottom: 7px;
      }

      .contact-widget__title {
        font-size: clamp(18px, 2.6vw, 24px);
      }

      .contact-grid {
        gap: 6px;
      }

      .contact-button {
        min-height: 38px;
        padding: 6px;
      }

      .contact-button__icon {
        flex-basis: 26px;
        width: 26px;
        height: 26px;
      }

      .contact-button__label {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="contact-page">
    <main class="contact-widget" aria-labelledby="contact-title">
      <img
        class="contact-widget__gif-corner"
        id="contact-logo"
        src=""
        alt=""
        aria-hidden="true"
        loading="lazy"
      >

      <header class="contact-widget__header">
        <h1 class="contact-widget__title" id="contact-title"></h1>
        <p class="contact-widget__text" id="contact-text"></p>
      </header>

      <section class="contact-grid" aria-label="Способы связи">
        <a
          class="contact-button contact-button--telegram"
          id="telegram-link"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="contact-button__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M21.7 3.3 2.9 10.6c-1.3.5-1.3 1.2-.2 1.5l4.8 1.5 1.8 5.5c.2.7.1 1 .8 1 .5 0 .8-.2 1.1-.5l2.6-2.5 5.3 3.9c1 .5 1.7.3 1.9-.9l3.4-16c.4-1.4-.5-2-1.7-1.5Z" fill="currentColor"/>
              <path d="m7.7 13.3 11.1-7c.5-.3 1-.1.6.2l-9 8.1-.3 3.5-1.7-5.2-.7.4Z" fill="rgba(19, 64, 59, 0.62)"/>
            </svg>
          </span>
          <span class="contact-button__content">
            <span class="contact-button__label">Telegram</span>
            <span class="contact-button__value" id="telegram-value"></span>
          </span>
        </a>

        <a
          class="contact-button contact-button--whatsapp"
          id="whatsapp-link"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          <span class="contact-button__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 2.3A9.4 9.4 0 0 0 4 16.6L2.7 21.7l5.2-1.4A9.4 9.4 0 1 0 12 2.3Z" fill="currentColor"/>
              <path d="M9.3 7.2c-.2-.5-.4-.5-.6-.5h-.5c-.2 0-.5.1-.7.3-.3.3-.9.9-.9 2.1s.9 2.4 1 2.6c.1.2 1.8 2.9 4.5 4 2.2.9 2.7.7 3.2.7s1.6-.7 1.8-1.3c.2-.7.2-1.2.2-1.3-.1-.1-.2-.2-.5-.4l-1.8-.9c-.3-.1-.5-.2-.7.1l-.7.9c-.1.2-.3.2-.6.1-.3-.1-1.1-.4-2-1.2-.7-.7-1.2-1.5-1.4-1.8-.1-.3 0-.4.1-.6l.4-.4c.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5l-.9-2.1Z" fill="rgba(19, 64, 59, 0.68)"/>
            </svg>
          </span>
          <span class="contact-button__content">
            <span class="contact-button__label">WhatsApp</span>
            <span class="contact-button__value" id="whatsapp-value"></span>
          </span>
        </a>

        <a
          class="contact-button contact-button--email"
          id="email-link"
          href="#"
        >
          <span class="contact-button__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4.5 6.5h15A1.5 1.5 0 0 1 21 8v8a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 16V8a1.5 1.5 0 0 1 1.5-1.5Z" stroke="currentColor" stroke-width="2"/>
              <path d="m4 8 8 5.5L20 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="contact-button__content">
            <span class="contact-button__label">Email</span>
            <span class="contact-button__value" id="email-value"></span>
          </span>
        </a>

        <a
          class="contact-button contact-button--phone"
          id="phone-link"
          href="#"
        >
          <span class="contact-button__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M8.1 5.1 9.5 8c.2.5.1 1-.3 1.4l-1 1c.8 1.7 2.1 3 3.8 3.8l1-1c.4-.4 1-.5 1.4-.3l2.9 1.4c.6.3.9.9.8 1.5l-.5 2.4c-.1.7-.7 1.2-1.5 1.2C9.9 19.5 4.5 14.1 4.5 7.9c0-.8.5-1.4 1.2-1.5l2.4-.5c.6-.1 1.2.2 1.5.8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="contact-button__content">
            <span class="contact-button__label">Телефон</span>
            <span class="contact-button__value" id="phone-value"></span>
          </span>
        </a>
      </section>
    </main>
  </div>

  <script>
    const config = window.contactWidgetConfig;

    const setCssVariable = (name, value) => {
      if (value !== null && value !== undefined && value !== "") {
        document.documentElement.style.setProperty(name, value);
      }
    };

    const injectFontImport = (fontImportUrl) => {
      if (!fontImportUrl) {
        return;
      }

      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = fontImportUrl;
      document.head.appendChild(link);
    };

    const applyFontConfig = (fonts) => {
      injectFontImport(fonts.importUrl);

      setCssVariable("--font-family-primary", fonts.family);
      setCssVariable("--font-weight-regular", fonts.weights?.regular);
      setCssVariable("--font-weight-medium", fonts.weights?.medium);
      setCssVariable("--font-weight-bold", fonts.weights?.bold);
    };

    const applyLogoConfig = (logo) => {
      setCssVariable("--logo-width", logo.width);
      setCssVariable("--logo-top", logo.top);
      setCssVariable("--logo-right", logo.right);
      setCssVariable("--logo-border-radius", logo.borderRadius);
      setCssVariable("--logo-opacity", logo.opacity);

      setCssVariable("--logo-compact-width", logo.compact?.width || logo.width);
      setCssVariable("--logo-compact-top", logo.compact?.top || logo.top);
      setCssVariable("--logo-compact-right", logo.compact?.right || logo.right);
      setCssVariable("--logo-compact-border-radius", logo.compact?.borderRadius || logo.borderRadius);
      setCssVariable("--logo-compact-opacity", logo.compact?.opacity || logo.opacity);

      setCssVariable("--logo-low-height-width", logo.lowHeight?.width || logo.width);
      setCssVariable("--logo-low-height-top", logo.lowHeight?.top || logo.top);
      setCssVariable("--logo-low-height-right", logo.lowHeight?.right || logo.right);
      setCssVariable("--logo-low-height-border-radius", logo.lowHeight?.borderRadius || logo.borderRadius);
      setCssVariable("--logo-low-height-opacity", logo.lowHeight?.opacity || logo.opacity);

      setCssVariable("--logo-tiny-height-display", logo.tinyHeight?.display || "none");
    };

    const applyHighlightConfig = (highlights) => {
      const applyButtonHighlight = (name, highlight) => {
        const opacity = highlight.enabled ? highlight.opacity : "0";
        const hoverOpacity = highlight.enabled ? highlight.hoverOpacity : "0";

        setCssVariable(`--${name}-highlight-color`, highlight.color);
        setCssVariable(`--${name}-highlight-opacity`, opacity);
        setCssVariable(`--${name}-highlight-opacity-hover`, hoverOpacity);
      };

      applyButtonHighlight("telegram", highlights.telegram);
      applyButtonHighlight("whatsapp", highlights.whatsapp);
      applyButtonHighlight("email", highlights.email);
      applyButtonHighlight("phone", highlights.phone);
    };

    const normalizeTelegram = (username) => username.replace(/^@/, "").trim();
    const normalizePhone = (phone) => phone.replace(/[^\d]/g, "");

    const applyContentConfig = (content) => {
      document.getElementById("contact-title").textContent = content.title;
      document.getElementById("contact-text").innerHTML = content.text;
    };

    const applyContactsConfig = (contacts) => {
      const telegramUsername = normalizeTelegram(contacts.telegramUsername);
      const whatsappPhone = normalizePhone(contacts.whatsappPhone);
      const phone = normalizePhone(contacts.displayPhone);

      document.getElementById("telegram-link").href = `https://t.me/${telegramUsername}`;
      document.getElementById("telegram-value").textContent = `@${telegramUsername}`;

      document.getElementById("whatsapp-link").href =
        `https://wa.me/${whatsappPhone}?text=${encodeURIComponent(contacts.whatsappText)}`;
      document.getElementById("whatsapp-value").textContent = contacts.displayPhone;

      document.getElementById("email-link").href =
        `mailto:${contacts.email}?subject=${encodeURIComponent(contacts.emailSubject)}&body=${encodeURIComponent(contacts.emailBody)}`;
      document.getElementById("email-value").textContent = contacts.email;

      document.getElementById("phone-link").href = `tel:+${phone}`;
      document.getElementById("phone-value").textContent = contacts.displayPhone;
    };

    applyFontConfig(config.fonts);
    applyLogoConfig(config.assets.logo);
    applyHighlightConfig(config.highlights);
    applyContentConfig(config.content);
    applyContactsConfig(config.contacts);

    document.getElementById("contact-logo").src = config.assets.logo.src;
  </script>
</body>
</html>
