<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact widget</title>
  <meta name="description" content="Interactive contact buttons for Telegram, WhatsApp, email and phone." />

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap");

    :root {
      --bg: #13403B;
      --text: #f5f7fb;
      --muted: rgba(245, 247, 251, 0.72);
      --glass-border: rgba(255, 255, 255, 0.34);
      --button-border: rgba(255, 255, 255, 0.26);
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.24);
      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 0;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      min-height: 100svh;
      color: var(--text);
      font-family:
        BlinkMacSystemFont,
        "Inter",
        ui-sans-serif,
        "Inter",
        system-ui,
        -apple-system,
        "Segoe UI",
        sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .contact-page {
      position: relative;
      display: flex;
      width: 100%;
      min-width: 0;
      min-height: 100svh;
      padding: clamp(8px, 2vw, 14px);
      overflow: hidden;
      background: var(--bg);
      isolation: isolate;
    }

    .contact-page::before,
    .contact-page::after {
      position: absolute;
      border-radius: 999px;
      content: "";
      pointer-events: none;
      z-index: 0;
    }

    .contact-page::before {
      top: -88px;
      left: -78px;
      width: 280px;
      height: 280px;
      background: rgba(255, 255, 255, 0.24);
      filter: blur(20px);
    }

    .contact-page::after {
      right: -120px;
      bottom: -128px;
      width: 360px;
      height: 360px;
      background: rgba(72, 191, 162, 0.42);
      filter: blur(24px);
    }

    .contact-widget {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      min-width: 0;
      min-height: calc(100svh - clamp(16px, 4vw, 28px));
      padding: clamp(14px, 2.8vw, 22px);
      overflow: hidden;
      border: 1px solid var(--glass-border);
      border-radius: clamp(20px, 3vw, 28px);
      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.24),
          rgba(255, 255, 255, 0.11) 44%,
          rgba(255, 255, 255, 0.16)
        );
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.38),
        inset 0 -1px 0 rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(34px) saturate(170%) contrast(108%);
      -webkit-backdrop-filter: blur(34px) saturate(170%) contrast(108%);
    }

    .contact-widget::before {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.42) 0%,
          rgba(255, 255, 255, 0.13) 34%,
          rgba(255, 255, 255, 0.05) 58%,
          rgba(255, 255, 255, 0.18) 100%
        );
      content: "";
      pointer-events: none;
      z-index: 0;
    }

    .contact-widget__gif-corner {
      position: absolute;
      top: clamp(12px, 2.2vw, 18px);
      right: clamp(12px, 2.2vw, 18px);
      width: clamp(62px, 11vw, 86px);
      height: auto;
      border-radius: clamp(14px, 2vw, 18px);
      opacity: 0.9;
      pointer-events: none;
      z-index: 3;
    }

    .contact-widget__header {
      position: relative;
      z-index: 2;
      display: grid;
      gap: clamp(4px, 1vw, 8px);
      max-width: calc(100% - clamp(84px, 15vw, 118px));
      margin-bottom: clamp(10px, 1.8vw, 16px);
    }

    .contact-widget__title {
      margin: 0;
      color: var(--text);
      font-family:
        "Inter",
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      font-size: clamp(22px, 4.1vw, 38px);
      font-weight: 700;
      line-height: 1.04;
      letter-spacing: -0.04em;
    }

    .contact-widget__text {
      max-width: 540px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(12px, 1.6vw, 14px);
      font-weight: 400;
      line-height: 1.38;
    }

    .contact-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(7px, 1.4vw, 10px);
      width: 100%;
      min-width: 0;
      margin-top: auto;
    }

    .contact-button {
      position: relative;
      display: flex;
      align-items: center;
      gap: clamp(7px, 1.4vw, 11px);
      min-width: 0;
      min-height: clamp(48px, 7.6vw, 62px);
      padding: clamp(8px, 1.6vw, 12px);
      overflow: hidden;
      border: 1px solid var(--button-border);
      border-radius: clamp(13px, 2vw, 16px);
      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.18),
          rgba(255, 255, 255, 0.10)
        );
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        0 8px 20px rgba(0, 0, 0, 0.08);
      color: var(--text);
      text-decoration: none;
      transition:
        transform var(--transition),
        border-color var(--transition),
        background var(--transition);
      isolation: isolate;
    }

    .contact-button::after {
      position: absolute;
      inset: auto 10px 10px auto;
      width: 68px;
      height: 68px;
      border-radius: 999px;
      background: var(--accent, rgba(255, 255, 255, 0.22));
      opacity: 0.14;
      filter: blur(10px);
      content: "";
      z-index: -1;
      transition:
        opacity var(--transition),
        transform var(--transition);
    }

    .contact-button:hover,
    .contact-button:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.42);
      background:
        linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.26),
          rgba(255, 255, 255, 0.15)
        );
      color: var(--text);
      text-decoration: none;
      outline: none;
    }

    .contact-button:hover::after,
    .contact-button:focus-visible::after {
      opacity: 0.26;
      transform: scale(1.18);
    }

    .contact-button__icon {
      display: grid;
      place-items: center;
      flex: 0 0 clamp(30px, 4.9vw, 38px);
      width: clamp(30px, 4.9vw, 38px);
      height: clamp(30px, 4.9vw, 38px);
      border-radius: clamp(9px, 1.7vw, 12px);
      background: rgba(255, 255, 255, 0.14);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .contact-button__icon svg {
      width: clamp(17px, 2.8vw, 21px);
      height: clamp(17px, 2.8vw, 21px);
    }

    .contact-button__content {
      min-width: 0;
      overflow: hidden;
    }

    .contact-button__label {
      display: block;
      max-width: 100%;
      margin-bottom: 2px;
      overflow: hidden;
      color: var(--text);
      font-size: clamp(12px, 1.7vw, 15px);
      font-weight: 700;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .contact-button__value {
      display: block;
      max-width: 100%;
      overflow: hidden;
      color: var(--muted);
      font-size: clamp(9px, 1.45vw, 12px);
      font-weight: 400;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 420px) {
      .contact-widget__text {
        max-width: 230px;
      }

      .contact-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 340px) {
      .contact-widget {
        padding: 12px;
      }

      .contact-widget__gif-corner {
        width: 58px;
      }

      .contact-widget__header {
        max-width: calc(100% - 72px);
      }

      .contact-widget__title {
        font-size: 21px;
      }

      .contact-widget__text {
        display: none;
      }

      .contact-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .contact-button {
        min-height: 44px;
        padding: 7px;
        gap: 6px;
      }

      .contact-button__icon {
        flex-basis: 28px;
        width: 28px;
        height: 28px;
      }

      .contact-button__icon svg {
        width: 16px;
        height: 16px;
      }

      .contact-button__label {
        font-size: 11px;
      }

      .contact-button__value {
        display: none;
      }
    }

    @media (max-height: 360px) {
      .contact-page {
        padding: 8px;
      }

      .contact-widget {
        min-height: calc(100svh - 16px);
        padding: 12px;
      }

      .contact-widget__gif-corner {
        width: 58px;
      }

      .contact-widget__header {
        max-width: calc(100% - 74px);
        margin-bottom: 8px;
      }

      .contact-widget__title {
        font-size: clamp(21px, 3.8vw, 30px);
      }

      .contact-widget__text {
        display: none;
      }

      .contact-button {
        min-height: 42px;
      }

      .contact-button__value {
        display: none;
      }
    }
  </style>
</head>

<body>
